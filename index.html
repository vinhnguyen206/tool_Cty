<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a4fa0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Báo giá TK">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href='data:application/manifest+json,{"name":"Trung Kiên - Báo giá","short_name":"Báo giá TK","start_url":".","display":"standalone","background_color":"%23ffffff","theme_color":"%231a4fa0"}'>
  <title>Trung Kiên — Phần mềm lập báo giá</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: Arial, sans-serif;
      background: #1e2a38;
      color: #eee;
      font-size: 13px
    }

    #topbar {
      background: #152030;
      padding: 9px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #0d7a3e;
      position: sticky;
      top: 0;
      z-index: 200
    }

    #topbar .logo {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-right: auto;
      letter-spacing: .5px
    }

    #topbar .logo span {
      color: #2ecc71
    }

    .tb-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      font-family: Arial
    }

    .tb-btn.green {
      background: #0d7a3e;
      color: #fff
    }

    .tb-btn.green:hover {
      background: #0a5e30
    }

    .tb-btn.blue {
      background: #1565c0;
      color: #fff
    }

    .tb-btn.blue:hover {
      background: #0d47a1
    }

    .tb-btn.red {
      background: #b71c1c;
      color: #fff
    }

    .tb-btn.red:hover {
      background: #8b0000
    }

    .tb-btn.gray {
      background: #455a64;
      color: #fff
    }

    .tb-btn.gray:hover {
      background: #263238
    }

    .tb-btn.orange {
      background: #e65100;
      color: #fff
    }

    .tb-btn.orange:hover {
      background: #bf360c
    }

    .tb-sep {
      width: 1px;
      height: 26px;
      background: rgba(255, 255, 255, .1)
    }

    #wrap {
      display: flex;
      height: calc(100vh - 50px)
    }

    #sidebar {
      width: 35%;
      background: #1a2535;
      border-right: 1px solid #2a3a50;
      overflow-y: auto;
      flex-shrink: 0;
      padding: 12px
    }

    #content {
      width: 65%;
      flex: 1;
      overflow-y: auto;
      background: #f0f2f5;
      padding: 0
    }

    .sb-sec {
      background: #222f42;
      border-radius: 7px;
      padding: 10px 12px;
      margin-bottom: 10px
    }

    .sb-hd {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #2ecc71;
      padding-bottom: 6px;
      border-bottom: 1px solid #2a3a50;
      margin-bottom: 9px
    }

    .f {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 7px
    }

    .f:last-child {
      margin-bottom: 0
    }

    .f label {
      font-size: 11px;
      color: #9ab;
      font-weight: 600
    }

    .f input,
    .f select,
    .f textarea {
      padding: 5px 8px;
      border: 1px solid #2a3a50;
      border-radius: 4px;
      font-size: 12px;
      font-family: Arial;
      color: #eee;
      background: #151f2e
    }

    .f input:focus,
    .f select:focus,
    .f textarea:focus {
      outline: none;
      border-color: #2ecc71
    }

    .f textarea {
      resize: vertical
    }

    .stp {
      background: #0d2035;
      color: #7fd1a0;
      border: 1px solid #2a3a50;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      min-width: 30px;
      padding: 4px 0;
      user-select: none
    }

    .stp:active {
      background: #16324d
    }

    .r2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px
    }

    .r3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px
    }

    .totals-sb {
      margin-top: 8px;
      border-top: 1px solid #2a3a50;
      padding-top: 8px;
      font-size: 12px
    }

    .tr {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      color: #9ab
    }

    .tr.grand {
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      border-top: 1px solid #3a5a40;
      margin-top: 5px;
      padding-top: 6px
    }

    #docArea {
      padding: 20px;
      overflow-y: auto;
      height: 100%
    }

    .doc-page {
      background: #fff;
      color: #000;
      max-width: 800px;
      margin: 0 auto;
      padding: 25px 30px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, .3);
      border: 1.5px solid #000;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12pt;
      line-height: 1.5
    }

    /* Ép đồng nhất MỘT font chữ cho toàn bộ báo giá (xem trước) */
    .doc-page,
    .doc-page * {
      font-family: 'Times New Roman', Times, serif !important;
    }

    .doc-page.a4 {
      min-height: 1100px
    }

    .center {
      text-align: center
    }

    .bold {
      font-weight: 700
    }

    .italic {
      font-style: italic
    }

    .right {
      text-align: right
    }

    .underline {
      text-decoration: underline
    }

    .mt4 {
      margin-top: 4px
    }

    .mt8 {
      margin-top: 8px
    }

    .mt12 {
      margin-top: 12px
    }

    .mt16 {
      margin-top: 16px
    }

    .mt20 {
      margin-top: 20px
    }

    .mt28 {
      margin-top: 28px
    }

    .mt40 {
      margin-top: 40px
    }

    .mb4 {
      margin-bottom: 4px
    }

    .mb8 {
      margin-bottom: 8px
    }

    .quoc-hieu {
      text-align: center;
      margin-bottom: 6px
    }

    .quoc-hieu .qh1 {
      font-size: 13pt;
      font-weight: 700;
      text-transform: uppercase
    }

    .quoc-hieu .qh2 {
      font-size: 11pt;
      font-weight: 700
    }

    .quoc-hieu .qh3 {
      font-size: 10pt
    }

    .doc-table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 10pt
    }

    .doc-table th {
      background: #1a4fa0;
      color: #fff;
      padding: 5px 6px;
      text-align: center;
      border: 1px solid #000;
      font-size: 9.5pt
    }

    .doc-table td {
      border: 1px solid #000;
      padding: 4px 6px;
      vertical-align: middle
    }

    .doc-table td.tdnum {
      text-align: right
    }

    .doc-table td.tdc {
      text-align: center
    }

    .doc-table tr.sum-row td {
      font-weight: 700;
      background: #eef
    }

    .doc-table tr.grand-row td {
      font-weight: 700;
      background: #ddf;
      font-size: 10.5pt
    }

    .sig-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      text-align: center;
      margin-top: 24px;
      font-size: 10pt
    }

    .sig-row.three {
      grid-template-columns: 1fr 1fr 1fr
    }

    .sig-col .sig-title {
      font-weight: 700;
      margin-bottom: 2px
    }

    .sig-col .sig-sub {
      font-style: italic;
      font-size: 9.5pt;
      color: #555
    }

    .sig-col .sig-space {
      min-height: 55px
    }

    .pt-info-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10.5pt
    }

    .pt-info-table td {
      padding: 3px 4px
    }

    /* Bao gia */
    .bg-item-card {
      background: #1a2535;
      border: 1px solid #2a3a50;
      border-radius: 5px;
      padding: 9px;
      margin-bottom: 7px
    }

    .bg-item-card .f label {
      color: #9ab
    }

    .bg-spec-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-top: 5px
    }

    .bg-price-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin-top: 5px
    }

    .bg-total-line {
      text-align: right;
      font-size: 11px;
      color: #9ab;
      border-top: 1px dashed #2a3a50;
      margin-top: 5px;
      padding-top: 5px
    }

    .bg-total-line b {
      color: #f39c12;
      font-size: 12px
    }

    @media print {
      body {
        background: #fff
      }

      #topbar,
      #sidebar {
        display: none !important
      }

      #wrap {
        display: block;
        height: auto
      }

      #content {
        overflow: visible;
        height: auto;
        background: #fff
      }

      #docArea {
        padding: 0;
        height: auto;
        overflow: visible
      }

      .doc-page {
        box-shadow: none;
        border: none !important;
        margin: 0;
        max-width: 100%;
        padding: 15px 20px
      }

      @page {
        size: A4;
        margin: 10mm
      }
    }

    @media screen and (max-width:768px) {

      html,
      body {
        max-width: 100%;
        overflow-x: hidden
      }

      body {
        font-size: 14px
      }

      img,
      svg,
      canvas,
      video {
        max-width: 100%;
        height: auto;
        object-fit: contain
      }

      #topbar {
        position: static;
        z-index: 220;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        max-width: 100%;
        overflow-x: hidden
      }

      #topbar .logo {
        flex: 1 1 100%;
        margin-right: 0;
        min-width: 0;
        font-size: 14px;
        line-height: 1.25;
        white-space: normal
      }

      #topbar .logo img {
        height: 26px !important;
        max-width: 34px
      }

      .tb-sep {
        display: none
      }

      .tb-btn {
        min-height: 40px;
        padding: 8px 10px;
        font-size: 12px;
        line-height: 1.2;
        flex: 1 1 calc(50% - 8px);
        min-width: 132px;
        white-space: normal
      }

      #wrap {
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: calc(100vh - 50px);
        width: 100%;
        max-width: 100%;
        overflow-x: hidden
      }

      #sidebar {
        width: 100%;
        max-width: 100%;
        border-right: 0;
        border-bottom: 1px solid #2a3a50;
        overflow: visible;
        flex-shrink: 1;
        padding: 10px
      }

      #content {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        overflow: visible;
        background: #f0f2f5;
        padding: 0
      }

      #docArea {
        order: 3;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        height: auto;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding: 10px;
        background: #f0f2f5
      }

      /* Bản xem trước CO VỪA bề ngang điện thoại (không ép 750px, không kéo ngang) */
      .doc-page {
        width: 100% !important;
        max-width: 100% !important;
        margin: 0 auto;
        padding: 12px 10px;
        font-size: 11pt;
        line-height: 1.45;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .18);
        overflow-wrap: break-word;
        word-break: break-word;
      }

      .doc-table {
        width: 100%;
        max-width: 100%;
        table-layout: fixed;
        font-size: 9pt
      }

      .doc-table td,
      .doc-table th {
        overflow-wrap: break-word;
        word-break: break-word;
      }

      .doc-table th,
      .doc-table td {
        padding: 4px 5px
      }

      .sig-row,
      .sig-row.three {
        grid-template-columns: 1fr !important
      }

      .f input,
      .f select,
      .f textarea,
      #bgItemsWrap input,
      #bgItemsWrap select,
      #bgItemsWrap textarea {
        width: 100% !important;
        max-width: 100% !important;
        min-height: 40px !important;
        font-size: 16px !important;
        padding: 8px 10px !important;
        box-sizing: border-box !important
      }

      .f textarea {
        min-height: 72px !important
      }

      .sb-sec,
      .bg-item-card {
        border-radius: 6px;
        padding: 10px
      }

      #sidebar {
        padding: 8px !important
      }
    }

    /* ===== Mục gập (accordion) cho Bên bán / Bên mua ===== */
    .sb-hd {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sb-caret {
      font-size: 11px;
      opacity: .75;
      transition: transform .15s ease;
    }

    .sb-sec.collapsed .sb-body {
      display: none;
    }

    .sb-sec.collapsed .sb-hd {
      margin-bottom: 0;
      border-bottom: none;
      padding-bottom: 0;
    }

    .sb-sec.collapsed .sb-caret {
      transform: rotate(-90deg);
    }

    .sb-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 11.5px;
      color: #cfe3d6;
    }

    .sb-check span {
      user-select: none;
    }

    /* ===== Gợi ý model (autocomplete) ===== */
    .bgi-suggest {
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      z-index: 60;
      background: #0d2035;
      border: 1px solid #2a3a50;
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 240px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .45);
    }

    .bgi-sug-item {
      padding: 9px 10px;
      cursor: pointer;
      border-bottom: 1px solid #1a2a3e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .bgi-sug-item:last-child {
      border-bottom: none;
    }

    .bgi-sug-item:hover,
    .bgi-sug-item.active {
      background: #1a3a5a;
    }

    .bgi-sug-item b {
      color: #fff;
      font-size: 11pt;
      font-weight: 600;
    }

    .bgi-sug-item span {
      color: #7fa8d0;
      font-size: 8.5pt;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div id="topbar">
    <div class="logo">Trung Kiên <span>|</span> Quản lý báo giá</div>
    <button class="tb-btn blue" onclick="bgPrintPDF()">🖨️ In Báo Giá</button>
    <button class="tb-btn" style="background:#b8860b;color:#fff" onclick="bgDownloadPDF(this)">📄 Tải PDF</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" style="background:#1d6a2e;color:#fff" onclick="bgExportExcel(this)">📊 Xuất Excel
      (.xlsx)</button>
    <div class="tb-sep"></div>
    <button class="tb-btn gray" onclick="saveFile()">💾 Lưu dữ liệu</button>
    <div class="tb-sep"></div>
    <button class="tb-btn orange" onclick="undoReset()" id="btnUndo" style="display:none">↩️ Khôi phục</button>
    <button class="tb-btn red" onclick="resetForm()">🔄 Tạo mới</button>
  </div>

  <div id="wrap">
    <div id="sidebar">
      <div class="sb-sec">
        <div class="sb-hd" onclick="this.parentNode.classList.toggle('collapsed')">📊 Thông tin báo giá<span
            class="sb-caret">▾</span></div>
        <div class="sb-body">
          <div class="f"><label>Mẫu báo giá</label>
            <select id="bg_template" onchange="renderDoc()">
              <option value="tk" selected>Mẫu Trung Kiên</option>
              <option value="maf">Mẫu MAF / Hà Nội Thịnh Vượng</option>
            </select>
          </div>
          <label class="sb-check"><input type="checkbox" id="bg_showSig" checked onchange="renderDoc()"
              style="width:18px!important;min-height:18px!important;height:18px;flex:0 0 auto;margin:0;accent-color:#2ecc71">
            <span>Hiển thị chữ ký &amp; con dấu Trung Kiên</span></label>
          <div class="f"><label>Số báo giá</label><input id="bg_soBG" placeholder="Tự sinh theo ngày..."
              oninput="renderDoc()" /></div>
          <div class="r3">
            <div class="f"><label>Ngày BG</label><input id="bg_ngay" type="number" inputmode="numeric" min="1" max="31"
                oninput="renderDoc()" /></div>
            <div class="f"><label>Tháng</label><input id="bg_thang" type="number" inputmode="numeric" min="1" max="12"
                oninput="renderDoc()" /></div>
            <div class="f"><label>Năm</label><input id="bg_nam" type="number" inputmode="numeric"
                oninput="renderDoc()" /></div>
          </div>
          <div class="f"><label>Thuế VAT %</label>
            <select id="bg_vat" onchange="bgRecalc()">
              <option value="0">0%</option>
              <option value="5">5%</option>
              <option value="8" selected>8%</option>
              <option value="10">10%</option>
            </select>
          </div>
          <div class="f"><label>Chiết khấu % <span style="color:#e67e22;font-weight:400">(ẩn — chỉ trừ vào tổng, tối đa 10%)</span></label>
            <div style="display:grid;grid-template-columns:auto 1fr auto;gap:4px">
              <button type="button" class="stp" onclick="bgStepCK(-1,event)" ontouchend="bgStepCK(-1,event)">−</button>
              <input type="text" inputmode="decimal" id="bg_ck" value="0" style="text-align:center" oninput="bgClampCK();bgRecalc()">
              <button type="button" class="stp" onclick="bgStepCK(1,event)" ontouchend="bgStepCK(1,event)">＋</button>
            </div>
          </div>
          <div class="f"><label>Ghi chú giao hàng</label>
            <textarea id="bg_ghiChu" rows="5" oninput="renderDoc()">Giá trên đã bao gồm VAT
Giao hàng trong vòng 1 ngày
Hàng mới 100%, bảo hành 12 tháng theo điều kiện của hãng
Hàng nhập khẩu có đầy đủ CO CQ</textarea>
          </div>
        </div>
      </div>
      <div class="sb-sec collapsed">
        <div class="sb-hd" onclick="this.parentNode.classList.toggle('collapsed')">👤 Khách hàng (Bên mua)<span
            class="sb-caret">▾</span></div>
        <div class="sb-body">
          <div class="f"><label>Khách hàng</label><input id="bg_khachHang" placeholder="Tên công ty / cá nhân"
              oninput="renderDoc()" /></div>
          <div class="f"><label>Địa chỉ KH</label><textarea id="bg_dcKH" rows="2" placeholder="Địa chỉ khách hàng"
              oninput="renderDoc()"></textarea></div>
          <div class="f"><label>Điện thoại KH</label><input id="bg_dtKH" inputmode="tel" placeholder="0901 234 567"
              oninput="renderDoc()" /></div>
        </div>
      </div>
      <div class="sb-sec collapsed">
        <div class="sb-hd" onclick="this.parentNode.classList.toggle('collapsed')">🏢 Đơn vị bán (Bên B)<span
            class="sb-caret">▾</span></div>
        <div class="sb-body">
          <div class="f"><label>Tên đơn vị</label><input id="benB_ten"
              value="CÔNG TY TNHH THƯƠNG MẠI VÀ CÔNG NGHIỆP TRUNG KIÊN" oninput="renderDoc()" /></div>
          <div class="f"><label>Đại diện</label><input id="benB_dd" value="Nguyễn Việt Trung" oninput="renderDoc()" />
          </div>
          <div class="f"><label>Chức vụ</label><input id="benB_cv" value="Giám Đốc" oninput="renderDoc()" /></div>
          <div class="f"><label>Địa chỉ</label><textarea id="benB_dc" rows="2"
              oninput="renderDoc()">Số 5, Ngõ 196, Đường Thạch Bàn, Phường Long Biên, TP Hà Nội</textarea></div>
          <div class="f"><label>Mã số thuế</label><input id="benB_mst" value="0109546164" oninput="renderDoc()" /></div>
          <div class="f"><label>Số tài khoản</label><input id="benB_stk" value="1100 00134 5555"
              oninput="renderDoc()" /></div>
          <div class="f"><label>Ngân hàng</label><input id="benB_nh"
              value="Ngân hàng TMCP Quân đội (MBBank) – CN Sở giao dịch 3" oninput="renderDoc()" /></div>
          <div class="f"><label>Điện thoại</label><input id="benB_dt" inputmode="tel" value="096.432.9898"
              oninput="renderDoc()" /></div>
        </div>
      </div>
      <div class="sb-sec">
        <div class="sb-hd">📦 Danh sách thiết bị</div>
        <div id="bgItemsWrap"></div>
        <button class="add-btn" onclick="bgAddItem()">＋ Thêm thiết bị</button>
        <div class="totals-sb" style="margin-top:10px">

        var nk = m.toUpperCase().replace(/[\s()]/g, '').replace(/\.0(?=[^0-9]|$)/g, '');

        if (!clean[nk] || score(ne) > score(clean[nk])) clean[nk] = ne;

    function toWords(n) {
      n = Math.round(n); if (n === 0) return 'Không đồng';
      var u = ['', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín'];
      var t10 = ['mười', 'mười một', 'mười hai', 'mười ba', 'mười bốn', 'mười lăm', 'mười sáu', 'mười bảy', 'mười tám', 'mười chín'];
      function s3(x) {
        var h = Math.floor(x / 100), t = Math.floor((x % 100) / 10), d = x % 10, s = '';
        if (h) s += u[h] + ' trăm '; if (t === 1) s += t10[d] + ' ';
        else { if (t > 1) s += u[t] + ' mươi '; if (d === 5 && t > 0) s += 'lăm '; else if (d === 1 && t > 1) s += 'mốt '; else if (d > 0) s += u[d] + ' '; } return s;
      }
      var b = Math.floor(n / 1e9), m = Math.floor((n % 1e9) / 1e6), th = Math.floor((n % 1e6) / 1e3), h = n % 1e3, s = '';
      if (b) s += s3(b) + 'tỷ '; if (m) s += s3(m) + 'triệu '; if (th) s += s3(th) + 'nghìn '; if (h) s += s3(h);

    // In / Lưu PDF — ưu tiên mở tab mới (hoạt động tốt trên điện thoại); fallback iframe nếu popup bị chặn
    function bgPrintViaIframe() {
      var html = bgPrintHTML();

      // Thử mở tab mới — mobile browsers hỗ trợ tốt hơn iframe
      try {
        var win = window.open('', '_blank');
        if (win) {
          win.document.write(html);
          win.document.close();
          return;
        }
      } catch (e) { /* popup bị chặn, xuống fallback */ }

      // Fallback: iframe ẩn (nếu popup bị chặn trên desktop)
      var old = document.getElementById('bgPrintFrame');
      if (old && old.parentNode) old.parentNode.removeChild(old);
      var iframe = document.createElement('iframe');
      iframe.id = 'bgPrintFrame';
      iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;height:1123px;border:0';
      document.body.appendChild(iframe);
      var d = iframe.contentWindow.document;
      d.open(); d.write(html); d.close();
      function fire() {
        try { iframe.contentWindow.focus(); iframe.contentWindow.print(); }
        catch (e) { alert('Không mở được hộp thoại In/Lưu PDF: ' + (e && e.message ? e.message : e)); }
      }
      function waitImgs(tries) {
        var imgs = d.images, ready = true;
        for (var i = 0; i < imgs.length; i++) { if (!imgs[i].complete) { ready = false; break; } }
        if (ready || tries <= 0) setTimeout(fire, 200);
        else setTimeout(function () { waitImgs(tries - 1); }, 120);
      }
      waitImgs(20);
    }

    // ===== Excel styling helpers (xlsx-js-style) — bám sát mẫu trong folder BaoGia =====
    var BG_TNR = 'Times New Roman';
    var BG_THIN = { style: 'thin', color: { rgb: 'FF000000' } };
    var BG_BORDER = { top: BG_THIN, bottom: BG_THIN, left: BG_THIN, right: BG_THIN };
    var BG_HFILL = { patternType: 'solid', fgColor: { rgb: 'D9E1F2' } };
    var BG_ACC = '_(* #,##0_);_(* \\(#,##0\\);_(* "-"??_);_(@_)';

    function bgCell(ws, r, c, v, s, numeric) {
      var addr = XLSX.utils.encode_cell({ r: r, c: c });
      var cell = { v: (v == null ? '' : v), t: numeric ? 'n' : 's' };
      if (s) cell.s = s;
      ws[addr] = cell;
    }
    function bgFillBox(ws, r1, c1, r2, c2, s) {
      for (var r = r1; r <= r2; r++) for (var c = c1; c <= c2; c++) {
        var addr = XLSX.utils.encode_cell({ r: r, c: c });
        if (!ws[addr]) ws[addr] = { v: '', t: 's' };
        if (s) ws[addr].s = s;
      }
    }
    function bgMerge(merges, r1, c1, r2, c2) {
      merges.push({ s: { r: r1, c: c1 }, e: { r: r2, c: c2 } });
    }
    function bgFinishSheet(ws, maxR, maxC, cols, rows, merges) {
      ws['!ref'] = 'A1:' + XLSX.utils.encode_cell({ r: maxR, c: maxC });
      ws['!cols'] = cols;
      if (rows) ws['!rows'] = rows;
      ws['!merges'] = merges;
      ws['!pageSetup'] = { paperSize: 9, orientation: 'portrait', fitToWidth: 1, fitToHeight: 0 };
      ws['!printOptions'] = { horizontalCentered: true };
      ws['!sheetProperties'] = { pageSetUpPr: { fitToPage: true } };
    }
    // Hiển thị mã model: hạ chữ "M" của ký hiệu 1 pha (SSM->SSm, 2SAM->2SAm, SLM->SLm, CDLFM->CDLFm, FS.../...M)
    function bgFmtModel(m) {
      if (!m) return m || '';
      m = String(m);
      m = m.replace(/^(\d*(?:SS|SP|SA|SL|CDLF))M/i, '$1m');
      m = m.replace(/^(FS[\d/]+)M\b/i, '$1m');
      return m;
    }
    function bgSpecsList(it) {
      var arr = [];
      if (it.model) arr.push('Model: ' + bgFmtModel(it.model));
      if (it.luuluong) arr.push('Lưu lượng: ' + it.luuluong);
      if (it.cotap) arr.push('Cột áp: ' + it.cotap);
      if (it.congSuat) arr.push('Công suất: ' + it.congSuat);
      if (it.xuatXu) arr.push('Xuất xứ: ' + it.xuatXu);
      (it.customSpecs || []).forEach(function (cs) {
        var v = (cs.value || '').trim(), n = (cs.name || '').trim();
        if (v) arr.push(n ? (n + ': ' + v) : v);
      });
      return arr;
    }
    function bgSaveXlsx(wb, prefix) {
      var khName = (bgG('bg_khachHang') || 'KhachHang').replace(/\s+/g, '_').substring(0, 20);
      XLSX.writeFile(wb, prefix + khName + '_' + bgG('bg_ngay') + bgG('bg_thang') + bgG('bg_nam') + '.xlsx');
    }

    // ===== Gợi ý model (autocomplete) =====
    var BG_MODEL_INDEX = null;
    function bgModelIndex() {
      if (BG_MODEL_INDEX) return BG_MODEL_INDEX;
      var seen = {}, list = [];
      for (var k in PRICE_DB) {
        var e = PRICE_DB[k]; if (!e || !e.model) continue;
        var nk = String(e.model).toUpperCase().replace(/[\s()\-\/]/g, '');
        if (seen[nk]) continue; seen[nk] = 1;
        list.push({ model: e.model, norm: nk, kw: e.kw, ll: e.luuluong, ca: e.cotap });
      }
      BG_MODEL_INDEX = list;
      return list;
    }
    function bgModelSuggest(i, q) {
      var box = document.getElementById('bgi_sug_' + i); if (!box) return;
      q = String(q || '').toUpperCase().replace(/[\s()\-\/]/g, '');
      if (q.length < 2) { box.style.display = 'none'; box.innerHTML = ''; return; }
      var idx = bgModelIndex(), pre = [], sub = [];
      for (var j = 0; j < idx.length; j++) {
        var pos = idx[j].norm.indexOf(q);
        if (pos === 0) pre.push(idx[j]);
        else if (pos > 0 && sub.length < 30) sub.push(idx[j]);
      }
      var res = pre.concat(sub).slice(0, 40);
      if (!res.length) { box.style.display = 'none'; box.innerHTML = ''; return; }
      box.innerHTML = res.map(function (r) {
        var info = [r.kw ? (r.kw + 'KW') : '', r.ll ? ('Q ' + r.ll) : '', r.ca ? ('H ' + r.ca) : ''].filter(Boolean).join(' · ');
        return '<div class="bgi-sug-item" onclick="bgPickModel(' + i + ',this.getAttribute(\'data-m\'))" data-m="' + escQ(r.model) + '">'
          + '<b>' + he(bgFmtModel(r.model)) + '</b>' + (info ? '<span>' + he(info) + '</span>' : '') + '</div>';
      }).join('');
      box.style.display = '';
    }
    function bgPickModel(i, model) {
      bgItems[i].model = String(model).toUpperCase();
      var inp = document.getElementById('bgi_model_' + i); if (inp) inp.value = model;
      var box = document.getElementById('bgi_sug_' + i); if (box) { box.style.display = 'none'; box.innerHTML = ''; }

    // Đóng gợi ý khi bấm ra ngoài ô model
    document.addEventListener('click', function (ev) {
      if (ev.target && ev.target.closest && ev.target.closest('.bg-model-wrap')) return;
      var boxes = document.querySelectorAll('.bgi-suggest');
      for (var b = 0; b < boxes.length; b++) boxes[b].style.display = 'none';
    });

    function priceDbNormKey(s) {
      s = String(s || '').toUpperCase().replace(/[\s\(\)]+/g, '').replace(/\.0(?=[^0-9]|$)/g, '');
      return s;
    }

    function priceDbLookup(model) {
      if (!model) return null;
      var k = priceDbNormKey(model);
      if (PRICE_DB[k]) return PRICE_DB[k];
      var k2 = k.replace(/-/g, '');
      if (PRICE_DB[k2]) return PRICE_DB[k2];
      var km = k.replace(/[-\/]/g, '');
      var keys = Object.keys(PRICE_DB);
      for (var i = 0; i < keys.length; i++) {
        var km2 = keys[i].replace(/[-\/]/g, '');
        if (km2 === km) return PRICE_DB[keys[i]];
      }
      for (var i = 0; i < keys.length; i++) {
        var km2 = keys[i].replace(/[-\/]/g, '');
        if (km2.length >= 3 && km.indexOf(km2) === 0) return PRICE_DB[keys[i]];
        if (km.length >= 3 && km2.indexOf(km) === 0) return PRICE_DB[keys[i]];
      }
      return null;
    }

    function bgLookupModel(i) {
      var it = bgItems[i];
      var found = priceDbLookup(it.model);
      if (!found) return;
      var brand = bgGetBrand();
      if (found.ten && !it.tenEdited) it.ten = bgBrandName(found.ten, brand);
      // Luôn ghi đè thông số theo model mới (model mới không có thì XÓA thông số cũ, tránh dính số liệu model trước)
      it.luuluong = found.luuluong || '';
      it.cotap = found.cotap || '';
      it.kw = found.kw || '';
      var detectedPhase = found.csPhase || detectPhaseFromModel(it.model);
      it.csPhase = detectedPhase;
      // Bơm định lượng công suất nhỏ -> mặc định hiện W (vẫn đổi được sang KW); còn lại KW
      it.csUnit = (found.ten && /định lượng/i.test(found.ten)) ? 'W' : 'KW';
      // Không có công suất (kW rỗng, không có sẵn congSuat) -> bỏ trống để KHÔNG hiện dòng "Công suất"
      it.congSuat = found.congSuat || (found.kw ? formatCongSuat(found.kw, detectedPhase, it.csUnit) : '');
      var csEl = document.getElementById('bgi_cs_' + i);
      if (csEl) csEl.value = detectedPhase;
      // Hãng mặc định = hãng có giá tối thiểu (mã 1 giá -> tự nhảy về đúng hãng đó); xuất xứ suy ra từ hãng
      var db = bgDefaultBrand(found);
      it.hang = db;
      it.xuatXu = BG_BRANDS[db].xx;
      if (!it.giaEdited) it.gia = bgBrandPrice(found, db) || +found.gia || 0;
      it._found = found;
      var el_ten = document.getElementById('bgi_ten_' + i);
      if (el_ten && !it.tenEdited) el_ten.value = it.ten;
      var el_gia = document.getElementById('bgi_gia_' + i);
      if (el_gia) el_gia.value = it.gia;
      var el_tt = document.getElementById('bgi_tt_' + i);
      if (el_tt) el_tt.value = fmt(it.sl * it.gia);
      // Cập nhật các ô tại chỗ (KHÔNG dựng lại sidebar) để không mất focus / nhảy phím trên điện thoại
      bgSyncItemInputs(i);
    }

    // Đồng bộ giá trị các ô nhập của thiết bị i từ bgItems[i] mà không phá/dựng lại DOM
    function bgSyncItemInputs(i) {
      var it = bgItems[i];
      function setVal(id, v) { var el = document.getElementById(id); if (el && document.activeElement !== el) el.value = v; }
      function setSelIfOption(id, v) {
        var el = document.getElementById(id); if (!el) return;
        for (var k = 0; k < el.options.length; k++) { if (el.options[k].value === v) { el.value = v; return; } }
      }
      setVal('bgi_ten_' + i, it.ten);
      setVal('bgi_gia_' + i, it.gia);
      var _kwf = parseFloat(it.kw), _u = it.csUnit || 'KW';
      var kwDisp = (it.kw !== '' && it.kw != null && !isNaN(_kwf)) ? (_u === 'W' ? String(Math.round(_kwf * 1000)) : String(_kwf)) : '';
      setVal('bgi_kw_' + i, kwDisp);
      var kwlbl = document.getElementById('bgi_kwlbl_' + i); if (kwlbl) kwlbl.textContent = 'Công suất (' + _u + ')';
      var kwbtn = document.getElementById('bgi_kwbtn_' + i); if (kwbtn) kwbtn.textContent = (_u === 'W') ? '⇄ KW' : '⇄ W';
      var tt = document.getElementById('bgi_tt_' + i); if (tt) tt.value = fmt(it.sl * it.gia);
      var csEl = document.getElementById('bgi_cs_' + i); if (csEl) csEl.value = it.csPhase || '3 Pha/380V/50Hz';
      // Lưu lượng: tách số + đơn vị
      var llM = String(it.luuluong || '').match(/^([0-9.,]+)\s*(.*)/);
      setVal('bgi_llnum_' + i, llM ? llM[1] : '');
      if (llM && llM[2].trim()) setSelIfOption('bgi_llunit_' + i, llM[2].trim());
      // Cột áp: tách số + đơn vị (đơn vị lạ -> ô tự điền)
      var caM = String(it.cotap || '').match(/^([0-9.,]+)\s*(.*)/);
      setVal('bgi_canum_' + i, caM ? caM[1] : '');
      var caUnit = caM ? caM[2].trim() : '';
      var caSel = document.getElementById('bgi_caunit_' + i), cac = document.getElementById('bgi_cac_' + i);
      if (caSel) {
        if (caUnit && ['m', 'KPa', 'Bar'].indexOf(caUnit) < 0) {
          caSel.value = '__custom__';
          if (cac) { cac.style.display = ''; if (document.activeElement !== cac) cac.value = caUnit; }
        } else {
          caSel.value = caUnit || 'm';
          if (cac) cac.style.display = 'none';
        }
      }
      // Hãng: trong danh sách -> chọn; lạ -> "Tự điền..." + ô nhập
      var hSel = document.getElementById('bgi_hang_' + i), hc = document.getElementById('bgi_hangc_' + i);
      if (hSel) {
        if (it.hang && BG_BRAND_LIST.indexOf(it.hang) < 0) {
          hSel.value = '__custom__';
          if (hc) { hc.style.display = ''; if (document.activeElement !== hc) hc.value = it.hang; }
        } else {
          hSel.value = it.hang || 'PEROTAC';
          if (hc) hc.style.display = 'none';
        }
      }
      // Xuất xứ: ô chữ tự do
      setVal('bgi_xx_' + i, it.xuatXu || '');
    }

    function detectPhaseFromModel(model) {
      var m = model.toUpperCase().replace(/[\s\(\)]/g, '');
      if (/^(SSM|SPM|SAM)/.test(m)) return '1 Pha/220V/50Hz';
      if (/^(SS|SP|SA)[^M]/.test(m) || /^(SS|SP|SA)\d/.test(m)) return '3 Pha/380V/50Hz';
      if (/^FS\d+\/\d+M/.test(m)) return '1 Pha/220V/50Hz';
      if (/^FS\d+\/\d+T/.test(m)) return '3 Pha/380V/50Hz';
      if (/^GB-?\d+S/.test(m)) return '3 Pha/380V/50Hz';
      if (/^GB-?\d+$/.test(m)) return '1 Pha/220V/50Hz';
      if (/CDLFM/.test(m)) return '1 Pha/220V/50Hz';
      if (/CDLF/.test(m)) return '3 Pha/380V/50Hz';
      if (/^JLM/.test(m)) return '1 Pha/220V/50Hz';
      if (/^JBB/.test(m)) return '3 Pha/380V/50Hz';
      if (/^C(660|6125|6250)/.test(m)) return '1 Pha/220V/50Hz';
      return '3 Pha/380V/50Hz';
    }

    // unit: 'KW' (mặc định) hoặc 'W'. Không có công suất -> trả '' (để ẩn dòng Công suất).
    function formatCongSuat(kw, phase, unit) {
      if (!kw || !parseFloat(kw)) return '';
      var kw_f = parseFloat(kw);
      if (unit === 'W') return String(Math.round(kw_f * 1000)) + 'W/' + (phase || '3 Pha/380V/50Hz');
      var hp = kwToHp(kw);
      var kwStr = kw_f === Math.floor(kw_f) ? String(Math.floor(kw_f)) : String(kw_f);
      return kwStr + 'KW' + (hp ? '(' + hp + 'HP)' : '') + '/' + (phase || '3 Pha/380V/50Hz');
    }

    // Hãng -> xuất xứ + cột giá tối thiểu tương ứng
    var BG_BRANDS = {
      'REDPUMP': { xx: 'Trung Quốc', key: 'giaRedpump' },
      'PEROTAC': { xx: 'Đài Loan', key: 'giaPerotac' },
      'AQUARIS': { xx: 'Italia', key: 'giaAquaris' }
    };
    var BG_BRAND_LIST = ['REDPUMP', 'PEROTAC', 'AQUARIS'];
    // Hãng mặc định khi chọn model = hãng có giá tối thiểu (ưu tiên PEROTAC > REDPUMP > AQUARIS).
    // Mã chỉ có giá 1 hãng (vd JLM/JBB chỉ có AQUARIS) -> tự nhảy về đúng hãng đó.
    function bgDefaultBrand(found) {
      if (+found.giaPerotac > 0) return 'PEROTAC';
      if (+found.giaRedpump > 0) return 'REDPUMP';
      if (+found.giaAquaris > 0) return 'AQUARIS';
      return 'PEROTAC';
    }
    function bgBrandPrice(found, brand) {
      var b = BG_BRANDS[brand];
      return b ? (+found[b.key] || 0) : 0;
    }
    // Đổi HÃNG: tự cập nhật xuất xứ + giá theo giá tối thiểu của hãng.
    // Hãng đó không có giá (=0) thì GIỮ NGUYÊN giá hiện tại. Cả hãng & xuất xứ đều sửa tay được.
    function bgChangeHang(i, val) {
      var it = bgItems[i];
      var cus = document.getElementById('bgi_hangc_' + i);
      if (val === '__custom__') {
        if (cus) { cus.style.display = ''; cus.focus(); }
        it.hang = cus ? cus.value : '';
      } else {
        if (cus) cus.style.display = 'none';
        it.hang = val;
        var b = BG_BRANDS[val];
        if (b) {
          it.xuatXu = b.xx;
          var xxi = document.getElementById('bgi_xx_' + i); if (xxi && document.activeElement !== xxi) xxi.value = b.xx;
          var found = it._found || priceDbLookup(it.model);
          if (found) {
            var p = bgBrandPrice(found, val);
            if (p > 0) {
              it.gia = p; it.giaEdited = false;
              var g = document.getElementById('bgi_gia_' + i); if (g) g.value = p;
              var tt = document.getElementById('bgi_tt_' + i); if (tt) tt.value = fmt(it.sl * it.gia);
            }
          }
        }
      }
      bgRecalc();
    }
    // Xuất xứ giờ chỉ là ô chữ tự do (sửa tay), không đổi giá
    function bgSetXX(i, val) { bgItems[i].xuatXu = val; renderDoc();
    }

    function kwToHp(kw) {
      var std = [[0.09, 0.12], [0.12, 0.17], [0.18, 0.25], [0.25, 0.33], [0.37, 0.5], [0.4, 0.5],
      [0.45, 0.6], [0.55, 0.75], [0.75, 1], [1.1, 1.5], [1.5, 2], [2.2, 3], [3, 4], [3.7, 5],
      [4, 5.5], [5.5, 7.5], [7.5, 10], [11, 15], [15, 20], [18.5, 25], [22, 30], [30, 40],
      [37, 50], [45, 60], [55, 75], [75, 100], [90, 120], [110, 150]];
      var val = parseFloat(kw);
      for (var i = 0; i < std.length; i++) {
        if (std[i][0] === val) return String(std[i][1]);
      }
      return null;
    }

    // Số nhập ở ô công suất hiểu theo đơn vị đang chọn (KW/W); LƯU kw luôn quy về KW (canonical)
    function bgBuildCS(i) {
      var kwEl = document.getElementById('bgi_kw_' + i);
      var cs = document.getElementById('bgi_cs_' + i);
      var raw = kwEl ? kwEl.value.trim() : '';
      var csVal = cs ? cs.value : '3 Pha/380V/50Hz';
      var unit = bgItems[i].csUnit || 'KW';
      var kwCanon = '';
      if (raw) { var v = parseFloat(raw.replace(',', '.')); if (!isNaN(v)) kwCanon = String(unit === 'W' ? v / 1000 : v); }
      bgItems[i].kw = kwCanon;
      bgItems[i].csPhase = csVal;
      bgItems[i].congSuat = kwCanon ? formatCongSuat(kwCanon, csVal, unit) : '';
      renderDoc();
    }
    // Đổi qua lại W <-> KW: chỉ lật cờ + hiển thị lại từ kw canonical -> KHÔNG lặp, KHÔNG đổi dữ liệu gốc
    function bgToggleCsUnit(i) {
      var it = bgItems[i];
      it.csUnit = (it.csUnit === 'W') ? 'KW' : 'W';
      var kwEl = document.getElementById('bgi_kw_' + i);

      if (kwEl) kwEl.value = (it.kw !== '' && it.kw != null && !isNaN(kwf)) ? (it.csUnit === 'W' ? String(Math.round(kwf * 1000)) : String(kwf)) : '';
      var lbl = document.getElementById('bgi_kwlbl_' + i); if (lbl) lbl.textContent = 'Công suất (' + it.csUnit + ')';
      var btn = document.getElementById('bgi_kwbtn_' + i); if (btn) btn.textContent = (it.csUnit === 'W') ? '⇄ KW' : '⇄ W';
      if (it.kw && !isNaN(kwf)) it.congSuat = formatCongSuat(it.kw, it.csPhase, it.csUnit); // có kw mới đổi; không kw thì giữ nguyên (bảo toàn dải công suất tủ điện...)
      renderDoc();
    }

    // ===== Cập nhật giá trị item từ ô nhập (đặt index trực tiếp, tránh lỗi tham chiếu) =====

    // Completely cleaned for single Báo giá focus-loss safety
    function bgRenderItems() {
      var w = document.getElementById('bgItemsWrap'); if (!w) return;
      w.innerHTML = bgItems.map(function (it, i) {
        var hangCustom = it.hang && BG_BRAND_LIST.indexOf(it.hang) < 0;
        var hangSelVal = hangCustom ? '__custom__' : (it.hang || 'PEROTAC');
        var hangOpts = BG_BRAND_LIST.map(function (v) { return '<option value="' + v + '"' + (hangSelVal === v ? ' selected' : '') + '>' + v + '</option>'; }).join('');
        hangOpts += '<option value="__custom__"' + (hangCustom ? ' selected' : '') + '>Tự điền...</option>';
        var llMatch = String(it.luuluong || '').match(/^([0-9.,]+)\s*(.*)/);
        var llNum = llMatch ? llMatch[1] : ''; var llUnit = llMatch ? llMatch[2].trim() : 'm³/h';
        if (!llUnit) llUnit = 'm³/h';
        var llUnitOpts = ['m³/h', 'm³/min', 'l/min', 'l/h'].map(function (v) { return '<option' + (llUnit === v ? ' selected' : '') + '>' + v + '</option>'; }).join('');
        var caMatch = String(it.cotap || '').match(/^([0-9.,]+)\s*(.*)/);
        var caNum = caMatch ? caMatch[1] : ''; var caUnit = caMatch ? caMatch[2].trim() : 'm';
        if (!caUnit) caUnit = 'm';
        var caIsCustom = (caUnit !== 'm' && caUnit !== 'KPa' && caUnit !== 'Bar');
        var caUnitOpts = '<option value="m"' + (caUnit === 'm' ? ' selected' : '') + '>m</option>'
          + '<option value="KPa"' + (caUnit === 'KPa' ? ' selected' : '') + '>KPa</option>'
          + '<option value="Bar"' + (caUnit === 'Bar' ? ' selected' : '') + '>Bar</option>'
          + '<option value="__custom__"' + (caIsCustom ? ' selected' : '') + '>Tự điền...</option>';
        var csPhase = it.csPhase || '3 Pha/380V/50Hz';
        var csUnit = it.csUnit || 'KW';
        var _kwf2 = parseFloat(it.kw);
        var kwDisp = (it.kw !== '' && it.kw != null && !isNaN(_kwf2)) ? (csUnit === 'W' ? String(Math.round(_kwf2 * 1000)) : String(_kwf2)) : '';
        return '<div class="bg-item-card">'
          + '<div class="ic-hd"><span class="ic-num">Thiết bị ' + (i + 1) + '</span>'
          + (bgItems.length > 1 ? '<button class="ic-del" onclick="bgDelItem(' + i + ')">✕</button>' : '<span></span>') + '</div>'
          + '<div class="f"><label>Tên thiết bị</label>'
          + '<input id="bgi_ten_' + i + '" value="' + escQ(it.ten) + '" placeholder="VD: Bơm REDPUMP..." '
          + 'oninput="bgItems[' + i + '].ten=this.value;bgItems[' + i + '].tenEdited=true;renderDoc()"></div>'
          + '<div class="f"><label>Model</label>'
          + '<div class="bg-model-wrap" style="position:relative">'
          + '<input id="bgi_model_' + i + '" value="' + escQ(it.model) + '" placeholder="Gõ ≥2 ký tự để gợi ý (VD: SS, 4SP...)" '
          + 'autocomplete="off" autocapitalize="characters" autocorrect="off" spellcheck="false" style="text-transform:uppercase;width:100%" '
          + 'oninput="bgItems[' + i + '].model=this.value.toUpperCase();bgModelSuggest(' + i + ',this.value);bgScheduleRender(' + i + ')" '
          + 'onfocus="bgModelSuggest(' + i + ',this.value)">'
          + '<div id="bgi_sug_' + i + '" class="bgi-suggest" style="display:none"></div>'
          + '</div></div>'
          + '<div class="f"><label>Hãng</label>'
          + '<select id="bgi_hang_' + i + '" onchange="bgChangeHang(' + i + ',this.value)">' + hangOpts + '</select>'
          + '<input id="bgi_hangc_' + i + '" placeholder="Nhập hãng..." value="' + (hangCustom ? escQ(it.hang) : '')
          + '" style="margin-top:3px;' + (hangCustom ? '' : 'display:none') + '" '
          + 'oninput="bgItems[' + i + '].hang=this.value;renderDoc()"></div>'
          + '<div class="f"><label>Xuất xứ</label>'
          + '<input id="bgi_xx_' + i + '" value="' + escQ(it.xuatXu || '') + '" placeholder="VD: Đài Loan" '
          + 'oninput="bgSetXX(' + i + ',this.value)"></div>'
          + '<div class="f"><label>Lưu lượng</label>'
          + '<div style="display:grid;grid-template-columns:1fr auto;gap:4px">'
          + '<input type="text" inputmode="decimal" id="bgi_llnum_' + i + '" value="' + escQ(llNum) + '" placeholder="VD: 30" '
          + 'oninput="bgSetLL(' + i + ')">'
          + '<select id="bgi_llunit_' + i + '" style="width:86px" onchange="bgSetLL(' + i + ')">' + llUnitOpts + '</select>'
          + '</div></div>'
          + '<div class="f"><label>Cột áp</label>'
          + '<div style="display:grid;grid-template-columns:1fr auto;gap:4px">'
          + '<input type="text" inputmode="decimal" id="bgi_canum_' + i + '" value="' + escQ(caNum) + '" placeholder="VD: 15" '
          + 'oninput="bgSetCA(' + i + ')">'
          + '<select id="bgi_caunit_' + i + '" style="width:86px" onchange="bgChangeCaUnit(' + i + ',this.value)">' + caUnitOpts + '</select>'
          + '</div>'
          + '<input id="bgi_cac_' + i + '" placeholder="Đơn vị cột áp..." value="' + (caIsCustom ? escQ(caUnit) : '')
          + '" style="margin-top:3px;' + (caIsCustom ? '' : 'display:none') + '" '
          + 'oninput="bgSetCA(' + i + ')"></div>'
          + '<div class="f"><label id="bgi_kwlbl_' + i + '">Công suất (' + csUnit + ')</label>'
          + '<div style="display:grid;grid-template-columns:1fr 1.3fr auto;gap:4px">'
          + '<input type="text" inputmode="decimal" id="bgi_kw_' + i + '" value="' + escQ(kwDisp) + '" placeholder="VD: 1.5" oninput="bgBuildCS(' + i + ')">'
          + '<select id="bgi_cs_' + i + '" onchange="bgBuildCS(' + i + ')">'
          + '<option value="1 Pha/220V/50Hz"' + (csPhase === '1 Pha/220V/50Hz' ? ' selected' : '') + '>1 Pha/220V/50Hz</option>'
          + '<option value="3 Pha/380V/50Hz"' + (csPhase === '3 Pha/380V/50Hz' ? ' selected' : '') + '>3 Pha/380V/50Hz</option>'
          + '</select>'
          + '<button type="button" id="bgi_kwbtn_' + i + '" onclick="bgToggleCsUnit(' + i + ')" title="Đổi W ⇄ KW" style="background:#0d2035;color:#7fd1a0;border:1px solid #2a3a50;border-radius:4px;padding:0 8px;font-size:9.5pt;cursor:pointer;white-space:nowrap">' + (csUnit === 'W' ? '⇄ KW' : '⇄ W') + '</button>'
          + '</div></div>'
          + '<div class="f"><label>Thông số tùy chỉnh</label>'
          + (it.customSpecs || []).map(function (cs, j) {
            return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:4px;margin-bottom:4px">'
              + '<input id="bgi_csn_' + i + '_' + j + '" value="' + escQ(cs.name) + '" placeholder="Tên thông số" oninput="bgSetCustomSpec(' + i + ',' + j + ',\'name\',this.value)">'
              + '<input id="bgi_csv_' + i + '_' + j + '" value="' + escQ(cs.value) + '" placeholder="Giá trị" oninput="bgSetCustomSpec(' + i + ',' + j + ',\'value\',this.value)">'
              + '<button class="ic-del" onclick="bgDelCustomSpec(' + i + ',' + j + ')">✕</button>'
              + '</div>';
          }).join('')
          + '<button class="add-btn" style="margin-top:2px;font-size:9.5pt;padding:5px" onclick="bgAddCustomSpec(' + i + ')">＋ Thêm thông số</button></div>'
          + '<div style="display:grid;gap:6px;margin-top:6px;background:#0a1929;border-radius:6px;padding:8px">'
          + '<div style="display:grid;grid-template-columns:74px 1fr;align-items:center;gap:6px"><div style="font-size:9pt;color:#aaa">Số lượng</div>'
          + '<div style="display:grid;grid-template-columns:auto 1fr auto;gap:4px">'
          + '<button type="button" class="stp" onclick="bgStepSL(' + i + ',-1,event)" ontouchend="bgStepSL(' + i + ',-1,event)">−</button>'
          + '<input type="text" inputmode="numeric" id="bgi_sl_' + i + '" value="' + it.sl + '" style="width:100%;min-width:0;background:#0d2035;color:#fff;border:1px solid #2a3a50;border-radius:4px;padding:5px 4px;font-size:11pt;text-align:center" oninput="bgSetSL(' + i + ')">'
          + '<button type="button" class="stp" onclick="bgStepSL(' + i + ',1,event)" ontouchend="bgStepSL(' + i + ',1,event)">＋</button></div></div>'
          + '<div style="display:grid;grid-template-columns:74px 1fr;align-items:center;gap:6px"><div style="font-size:9pt;color:#aaa">Đơn giá (đ)</div>'
          + '<div style="display:grid;grid-template-columns:auto 1fr auto;gap:4px">'
          + '<button type="button" class="stp" onclick="bgStepGia(' + i + ',-1,event)" ontouchend="bgStepGia(' + i + ',-1,event)">−</button>'
          + '<input type="text" inputmode="numeric" id="bgi_gia_' + i + '" value="' + it.gia + '" placeholder="VD: 5000000" style="width:100%;min-width:0;background:#0d2035;color:#fff;border:1px solid #2a3a50;border-radius:4px;padding:5px 4px;font-size:11pt;text-align:center" oninput="bgSetGia(' + i + ')">'
          + '<button type="button" class="stp" onclick="bgStepGia(' + i + ',1,event)" ontouchend="bgStepGia(' + i + ',1,event)">＋</button></div></div>'
          + '<div style="display:grid;grid-template-columns:74px 1fr;align-items:center;gap:6px"><div style="font-size:9pt;color:#aaa">Thành tiền</div>'
          + '<input id="bgi_tt_' + i + '" readonly value="' + fmt(it.sl * it.gia) + '" style="width:100%;background:#0d1e30;color:#f39c12;border:1px solid #2a3a50;border-radius:4px;padding:5px 6px;font-size:11pt;font-weight:700;text-align:center"></div>'
          + '</div>';
      }).join('');
    }

    function saveFile() {
      renderDocNow(); // dựng bản mới nhất (kèm ảnh) trước khi lưu, tránh trễ 1 nhịp rAF
      var html = document.documentElement.outerHTML;
      var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      var filename = 'BaoGia_TrungKien_' + (bgG('bg_soBG') || bgNgay().split('/').join('-')) + '.html';
      a.download = filename;
      a.click();
    }

    function resetForm() {
      if (!confirm('Tạo báo giá mới? Dữ liệu hiện tại sẽ bị xóa.')) return;
      var savedState = {};
      var ids = [
        'bg_soBG', 'bg_khachHang', 'bg_dcKH', 'bg_dtKH', 'bg_ngay', 'bg_thang', 'bg_nam',
        'bg_vat', 'bg_ck', 'bg_ghiChu', 'bg_template',
        'benB_ten', 'benB_dd', 'benB_cv', 'benB_dc', 'benB_mst', 'benB_stk', 'benB_nh', 'benB_dt'
      ];
      ids.forEach(function (id) { var el = document.getElementById(id); if (el) savedState[id] = el.value; });
      savedState.bgItems = JSON.parse(JSON.stringify(bgItems));
      window._savedState = savedState;
      var btnUndo = document.getElementById('btnUndo'); if (btnUndo) btnUndo.style.display = '';

      ['bg_soBG', 'bg_khachHang', 'bg_dcKH', 'bg_dtKH'].forEach(function (id) {
        var el = document.getElementById(id); if (el) el.value = '';
      });

      bgItems = [{ ten: '', model: '', luuluong: '', cotap: '', congSuat: '', kw: '', csPhase: '3 Pha/380V/50Hz', csUnit: 'KW', hang: 'PEROTAC', xuatXu: 'Đài Loan', sl: 1, gia: 0, giaEdited: false, tenEdited: false, customSpecs: [] }];
      setToday();
      bgRenderItems();
      bgRecalc();
    }

    function undoReset() {
      if (!window._savedState) return;
      var ids = [
        'bg_soBG', 'bg_khachHang', 'bg_dcKH', 'bg_dtKH', 'bg_ngay', 'bg_thang', 'bg_nam',
        'bg_vat', 'bg_ck', 'bg_ghiChu', 'bg_template',
        'benB_ten', 'benB_dd', 'benB_cv', 'benB_dc', 'benB_mst', 'benB_stk', 'benB_nh', 'benB_dt'
      ];
      ids.forEach(function (id) {
        var el = document.getElementById(id);
        if (el && window._savedState[id] !== undefined) el.value = window._savedState[id];
      });
      if (window._savedState.bgItems) {
        bgItems = JSON.parse(JSON.stringify(window._savedState.bgItems));
      }
      var btnUndo = document.getElementById('btnUndo'); if (btnUndo) btnUndo.style.display = 'none';
      bgRenderItems();
      bgRecalc();
    }

    function setToday() {
      var d = new Date();
      var yyyy = d.getFullYear();
      var el;
      el = document.getElementById('bg_ngay'); if (el && !el.value) el.value = d.getDate();
      el = document.getElementById('bg_thang'); if (el && !el.value) el.value = d.getMonth() + 1;
      el = document.getElementById('bg_nam'); if (el && !el.value) el.value = yyyy;
    }

    // ===== Render preview theo mô hình "tách luồng nhập / hiển thị" =====
    // Khi đang gõ: KHÔNG render. Chỉ render lại preview khi NGỪNG gõ ~350ms,
    // hoặc khi rời ô (focusout) -> gõ thoải mái, bàn phím không nháy, máy không phải làm việc liên tục.
    var _bgDocTimer = null;
    var _bgPendingLookup = null;
    var BG_RENDER_DELAY = 350; // ms ngừng gõ thì mới hiển thị

    function renderDocNow() {
      if (_bgDocTimer) { clearTimeout(_bgDocTimer); _bgDocTimer = null; }
      var area = document.getElementById('docArea');
      if (!area) return;
      // Chạy nốt việc dò mã đang chờ (nếu có) trước khi vẽ
      if (_bgPendingLookup != null) { var li = _bgPendingLookup; _bgPendingLookup = null; bgLookupModel(li); }
      area.innerHTML = docBaoGia();
      // Gán ảnh chữ ký/con dấu SAU khi dựng (không nhúng base64 ~590KB vào chuỗi mỗi lần render)
      var imgs = area.querySelectorAll('img.bgDocImg');
      for (var k = 0; k < imgs.length; k++) {
        var src = imgs[k].getAttribute('data-img') === 'stamp' ? STAMP_IMG : SIG_IMG;
        if (imgs[k].getAttribute('src') !== src) imgs[k].src = src;
      }
    }

    // Hẹn render khi ngừng gõ; lookupIndex != null => dò mã model i khi tới giờ render
    function bgScheduleRender(lookupIndex) {
      if (lookupIndex != null) _bgPendingLookup = lookupIndex;
      if (_bgDocTimer) clearTimeout(_bgDocTimer);
      _bgDocTimer = setTimeout(renderDocNow, BG_RENDER_DELAY);
    }

    // Tên cũ renderDoc giờ = "hẹn render khi rảnh" để mọi nơi đang gọi đều theo mô hình mới
    function renderDoc() { bgScheduleRender(null); }

    // Bản báo giá có NHÚNG ảnh base64 inline — dùng cho In/PDF (cửa sổ mới không chạy renderDocNow)
    function bgDocInlineImages() {
      return docBaoGia()
        .replace('data-img="sig"', 'data-img="sig" src="' + SIG_IMG + '"')
        .replace('data-img="stamp"', 'data-img="stamp" src="' + STAMP_IMG + '"');
    }

    // ===== INIT =====
    setToday();
    bgRenderItems();
    bgRecalc();
    renderDocNow(); // vẽ ngay khi mở trang (không chờ debounce)

    // Rời khỏi ô nhập (chuyển ô / tắt bàn phím) -> hiển thị ngay, không cần chờ 350ms
    (function () {
      var sb = document.getElementById('sidebar');
      if (sb) sb.addEventListener('focusout', function () { renderDocNow(); });
    })();

    // Service worker: lưu cache để lần sau mở NHANH + DÙNG ĐƯỢC KHI KHÔNG CÓ MẠNG (đi đường vẫn báo giá)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () { });
      });
    }

  </script>
